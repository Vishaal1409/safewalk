version: '3.8'

services:
  # ----------------------------------------
  # Backend Service (FastAPI)
  # ----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ----------------------------------------
  # Frontend Service (React / Vite)
  # ----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"  # Update to 5173 if using Vite
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    depends_on:
      - backend

  # ----------------------------------------
  # Optional: Database (e.g., PostgreSQL)
  # Uncomment if local DB is needed instead of Supabase
  # ----------------------------------------
